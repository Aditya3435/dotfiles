# ~/.config/yazi/yazi.toml

[mgr]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 8
mouse_events   = ["click", "scroll", "touch", "move"]
title_format   = "Yazi: {cwd}"

[preview]
tab_size        = 4
max_width       = 1200
max_height      = 900
cache_dir       = "~/.cache/yazi"

[opener]

edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

open = [
    { run = 'xdg-open "$1"', desc = "Open", orphan = true }
]

extract = [
    { run = '7z x "$1" -o"${1%.zip}"', desc = "Extract here" }
]

play = [
    { run = 'mpv "$@"', orphan = true }
]

image = [
    { run = 'imv "$@"', orphan = true }
]

pinta = [
    { run = 'pinta "$@"', orphan = true, desc = "Open with Pinta" }
]

[open]
prepend_rules = [
    { mime = "text/*", use = "edit" },

    { mime = "image/*", use = ["pinta", "image"]},
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },

    { mime = "application/zip", use = "extract" },
    { mime = "application/x-tar", use = "extract" },
]

[tasks]
micro_workers    = 10
macro_workers    = 4
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[plugin]

prepend_previewers = [
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
]

prepend_preloaders = [
    { mime = "image/*", run = "image" },
]

[input]
cursor_blink = true

[select]
border   = "rounded"
active   = "bold"
inactive = "none"

[which]
sort_by = "key"
sort_sensitive = false
sort_reverse = false

[log]
enabled = false
